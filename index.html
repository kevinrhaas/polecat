<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polecat — coming soon</title>
  <meta name="description" content="Polecat — ask once, hear from every model. One prompt, many AIs, one synthesized answer. Coming soon to polecat.live.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" href="assets/polecat.svg" type="image/svg+xml">
  <meta property="og:title" content="Polecat — coming soon">
  <meta property="og:description" content="Ask once. Hear from everyone. One prompt → many models → one synthesized answer, right in your browser.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://polecat.live">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 28px;
      background: radial-gradient(1200px 640px at 50% -12%, #1b1436 0%, #0a0a0f 62%);
      color: #e8e8f2; -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 470px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .icon {
      width: 134px; height: 134px;
      filter: drop-shadow(0 10px 30px rgba(156,107,63,.38));
      animation: float 4.2s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    h1 { font-size: 42px; font-weight: 800; letter-spacing: -1.2px; line-height: 1; }
    .live { color: #8888aa; font-weight: 600; font-size: .4em; vertical-align: super; letter-spacing: 0; }
    .tag { font-size: 18px; font-weight: 600; color: #cccce4; }
    .soon {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 700;
      background: rgba(147,51,234,.14); border: 1px solid rgba(147,51,234,.42); color: #cba6f6;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #cba6f6; animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    .desc { font-size: 14.5px; color: #8e8eb0; line-height: 1.65; max-width: 400px; }
    .v1 { font-size: 13px; color: #6a6a8a; margin-top: 4px; }
    .v1 a { color: #9aa0d6; text-decoration: none; border-bottom: 1px solid rgba(154,160,214,.4); }
    .v1 a:hover { color: #c3c7f0; }
  </style>
</head>
<body>
  <main class="wrap">
    <svg class="icon" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Polecat">
      <ellipse cx="60" cy="58" rx="25" ry="29" fill="#9C6B3F" transform="rotate(-16 60 58)"/>
      <ellipse cx="160" cy="58" rx="25" ry="29" fill="#9C6B3F" transform="rotate(16 160 58)"/>
      <ellipse cx="62" cy="62" rx="12" ry="15" fill="#F4A6A6" transform="rotate(-16 62 62)"/>
      <ellipse cx="158" cy="62" rx="12" ry="15" fill="#F4A6A6" transform="rotate(16 158 62)"/>
      <ellipse cx="110" cy="122" rx="84" ry="78" fill="#F5E9D6"/>
      <path d="M28 102 Q110 80 192 102 Q196 128 160 137 Q110 146 60 137 Q24 128 28 102 Z" fill="#2E2A33"/>
      <circle cx="78" cy="113" r="19" fill="#ffffff"/>
      <circle cx="142" cy="113" r="19" fill="#ffffff"/>
      <circle cx="81" cy="116" r="10.5" fill="#2E2A33"/>
      <circle cx="139" cy="116" r="10.5" fill="#2E2A33"/>
      <circle cx="85" cy="112" r="3.6" fill="#ffffff"/>
      <circle cx="143" cy="112" r="3.6" fill="#ffffff"/>
      <circle cx="54" cy="156" r="12" fill="#F4A6A6" opacity="0.55"/>
      <circle cx="166" cy="156" r="12" fill="#F4A6A6" opacity="0.55"/>
      <path d="M110 150 q10 0 8 8.5 q-2 6.5 -8 7.5 q-6 -1 -8 -7.5 q-2 -8.5 8 -8.5 Z" fill="#3A2F3A"/>
      <path d="M110 166 q-9 9 -17 2.5 M110 166 q9 9 17 2.5" stroke="#3A2F3A" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
    <h1>Polecat<span class="live">.live</span></h1>
    <div class="tag">Ask once. Hear from everyone.</div>
    <div class="soon"><span class="dot"></span> Coming soon</div>
    <p class="desc">One prompt → many models, side by side, with a synthesized consensus answer. 100% in your browser, your own API keys, no server.</p>
    <p class="v1">Looking for the current version? → <a href="https://kevinrhaas.github.io/polychat/">PolyChat v1</a></p>
  </main>
</body>
</html>
